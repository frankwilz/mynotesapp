<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Note</title>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
/* Modal Styles */
#tutorial-modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgba(0,0,0,0.8);
}

#tutorial-content {
  background-color: #fff;
  margin: 10% auto;
  padding: 20px;
  border-radius: 15px;
  max-width: 600px;
  position: relative;
}

#tutorial-content h3 {
  text-align: center;
  margin-bottom: 15px;
}

#tutorial-content video, #tutorial-content iframe {
  width: 100%;
  height: 300px;
  border-radius: 10px;
}

#close-tutorial {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 20px;
  cursor: pointer;
  background: #f44336;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
}
</style>
</head>
<body>

<!-- Tutorial Modal -->
<div id="tutorial-modal">
  <div id="tutorial-content">
    <button id="close-tutorial">Skip</button>
    <h3>How to use my notes app</h3>
    <!-- MY RECORDING -->
    <video controls>
      <source src="tutorial.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
</div>

<!-- Registration-->
<form id="register-form">
  <h2>Register</h2>
  <input type="text" id="username" placeholder="Username" autocomplete="username">
  <input type="password" id="password" placeholder="Password" autocomplete="new-password">
  <button id="register-btn" type="submit">Register</button>
  <p id="register-error" class="auth-error"></p>
  <p>Already have an account? <a href="login.html">Login</a></p>
</form>

<script>
const API_BASE = '/api';
const AUTH_TOKEN_KEY = 'notes_token';
const AUTH_USER_KEY = 'notes_user';
const registerForm = document.getElementById('register-form');
const registerBtn = document.getElementById('register-btn');
const errorEl = document.getElementById('register-error');

if (localStorage.getItem(AUTH_TOKEN_KEY)) {
  window.location.href = 'notes.html';
}

function setError(message = '') {
  errorEl.textContent = message;
}

function setBusy(isBusy) {
  registerBtn.disabled = isBusy;
  registerBtn.textContent = isBusy ? 'Registering...' : 'Register';
}

async function fetchJsonWithTimeout(url, options = {}, timeoutMs = 12000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const response = await fetch(url, { ...options, signal: controller.signal });
    const payload = await response.json().catch(() => ({}));
    return { response, payload };
  } finally {
    clearTimeout(timer);
  }
}

registerForm.addEventListener('submit', async (event) => {
  event.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) {
    setError('Fill in both fields.');
    return;
  }

  setError('');
  setBusy(true);

  try {
    const { response, payload } = await fetchJsonWithTimeout(`${API_BASE}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });

    if (!response.ok) {
      throw new Error(payload.msg || 'Registration failed.');
    }

    localStorage.setItem(AUTH_TOKEN_KEY, payload.token);
    localStorage.setItem(AUTH_USER_KEY, JSON.stringify(payload.user));
    window.location.href = 'notes.html';
  } catch (error) {
    if (error.name === 'AbortError') {
      setError('Server timeout. Please try again.');
    } else if (error.message === 'Failed to fetch') {
      setError('Server unavailable. Please try again soon.');
    } else {
      setError(error.message || 'Registration failed.');
    }
  } finally {
    setBusy(false);
  }
});

// Tutorial
const modal = document.getElementById('tutorial-modal');
const closeBtn = document.getElementById('close-tutorial');

// Show tutorial only for first-time visitors
if (!localStorage.getItem('tutorialShown')) {
  modal.style.display = 'block';
  localStorage.setItem('tutorialShown', 'true');
}

// Close
closeBtn.addEventListener('click', () => {
  modal.style.display = 'none';
});

// Close modal if clicking outside the content
window.addEventListener('click', (e) => {
  if (e.target == modal) modal.style.display = 'none';
});
</script>
</body>
</html>
