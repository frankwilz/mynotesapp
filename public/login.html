<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Note App</title>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>
<form id="login-form">
  <h2>Login</h2>
  <input type="text" id="login-username" placeholder="Username" autocomplete="username">
  <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
  <button id="login-btn" type="submit">Login</button>
  <p id="login-error" class="auth-error"></p>
  <p>Don't have an account? <a href="index.html">Register</a></p>
</form>

<script>
const API_BASE = '/api';
const AUTH_TOKEN_KEY = 'notes_token';
const AUTH_USER_KEY = 'notes_user';
const loginForm = document.getElementById('login-form');
const loginBtn = document.getElementById('login-btn');
const errorEl = document.getElementById('login-error');

if (localStorage.getItem(AUTH_TOKEN_KEY)) {
  window.location.href = 'notes.html';
}

function setError(message = '') {
  errorEl.textContent = message;
}

function setBusy(isBusy) {
  loginBtn.disabled = isBusy;
  loginBtn.textContent = isBusy ? 'Logging in...' : 'Login';
}

async function fetchJsonWithTimeout(url, options = {}, timeoutMs = 12000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const response = await fetch(url, { ...options, signal: controller.signal });
    const payload = await response.json().catch(() => ({}));
    return { response, payload };
  } finally {
    clearTimeout(timer);
  }
}

loginForm.addEventListener('submit', async (event) => {
  event.preventDefault();
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();

  if(!username || !password) {
    setError('Fill in both fields.');
    return;
  }

  setError('');
  setBusy(true);

  try {
    const { response, payload } = await fetchJsonWithTimeout(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });

    if (!response.ok) {
      throw new Error(payload.msg || 'Login failed.');
    }
    localStorage.setItem(AUTH_TOKEN_KEY, payload.token);
    localStorage.setItem(AUTH_USER_KEY, JSON.stringify(payload.user));
    window.location.href = 'notes.html';
  } catch (error) {
    if (error.name === 'AbortError') {
      setError('Server timeout. Please try again.');
    } else if (error.message === 'Failed to fetch') {
      setError('Server unavailable. Please try again soon.');
    } else {
      setError(error.message || 'Login failed.');
    }
  } finally {
    setBusy(false);
  }
});
</script>
</body>
</html>
